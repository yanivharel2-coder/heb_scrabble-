<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>שבץ נא בעברית</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Arial,sans-serif;direction:rtl;background:#f0f0f5;min-height:100vh;padding:.5rem;overflow-x:hidden;}
#app{max-width:480px;margin:0 auto;}
h1{text-align:center;font-size:18px;margin-bottom:.5rem;color:#333;}

/* players */
#top{display:flex;gap:6px;margin-bottom:.5rem;}
.pc{flex:1;border-radius:10px;border:2px solid #ddd;padding:8px 10px;background:#fff;transition:.2s;}
.pc.a1{border-color:#534AB7;background:#EEEDFE;}
.pc.a2{border-color:#0F6E56;background:#E1F5EE;}
.pn{font-size:11px;font-weight:600;color:#888;}
.pc.a1 .pn{color:#3C3489;}
.pc.a2 .pn{color:#085041;}
.ps{font-size:24px;font-weight:700;color:#333;}
.tb{font-size:9px;padding:1px 6px;border-radius:8px;background:#534AB7;color:#fff;display:inline-block;margin-top:2px;}
.pc.a2 .tb{background:#0F6E56;}
.tb.h{visibility:hidden;}
#vs{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 2px;gap:1px;}

/* board - responsive size */
#bwrap{background:#fff;border-radius:10px;border:1px solid #ddd;padding:5px;margin-bottom:.5rem;overflow:hidden;}
#board{display:grid;gap:2px;width:100%;}
.cl{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:700;border:1px solid #ddd;background:#fafafa;position:relative;cursor:pointer;transition:background .1s;touch-action:manipulation;}
.cl.dw{background:#FBEAF0;border-color:#ED93B1;}
.cl.tw{background:#FCEBEB;border-color:#F09595;}
.cl.dl{background:#E6F1FB;border-color:#85B7EB;}
.cl.tl{background:#dcf5ec;border-color:#5DCAA5;}
.cl.st{background:#FAEEDA;border-color:#EF9F27;}
.cl.lp1{background:#EEEDFE;border-color:#7F77DD;color:#26215C;}
.cl.lp2{background:#E1F5EE;border-color:#1D9E75;color:#04342C;}
.cl.pv{background:#FAC775;border-color:#BA7517;color:#3d2200;}
.cl.pv:active{background:#f0b040;}
.bl{font-size:6px;position:absolute;bottom:1px;left:1px;color:#aaa;pointer-events:none;line-height:1;}

/* hand */
#hwrap{background:#fff;border:1px solid #ddd;border-radius:10px;padding:.6rem;margin-bottom:.5rem;}
#hl{font-size:11px;color:#888;margin-bottom:5px;}
#hand{display:flex;gap:5px;flex-wrap:wrap;min-height:56px;align-items:center;}
.tl2{width:52px;height:52px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;touch-action:manipulation;transition:transform .1s;}
.tl2.t1{background:#EEEDFE;border:1.5px solid #AFA9EC;color:#26215C;}
.tl2.t2{background:#E1F5EE;border:1.5px solid #5DCAA5;color:#04342C;}
.tl2:active{transform:scale(0.95);}
.tl2.sel{outline:3px solid #534AB7;transform:scale(1.08);}
.tl2.t2.sel{outline-color:#0F6E56;}
.tl2 .lt{font-size:24px;font-weight:700;line-height:1;}
.tl2 .pt{font-size:9px;opacity:.55;margin-top:1px;}

/* direction */
#dir{display:flex;gap:6px;align-items:center;margin-bottom:.5rem;font-size:12px;color:#888;}
#dir button{flex:1;padding:8px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#f5f5f5;color:#666;touch-action:manipulation;}
#dir button.a{background:#EEEDFE;color:#26215C;border-color:#AFA9EC;font-weight:700;}

/* actions */
#acts{display:flex;gap:6px;margin-bottom:.5rem;}
#acts button{flex:1;padding:12px 6px;font-size:14px;border-radius:10px;cursor:pointer;border:1px solid #ddd;background:#f5f5f5;touch-action:manipulation;font-weight:600;color:#111;}
#sb{background:#534AB7;color:#fff;border:none;font-weight:700;}
#sb:active{background:#3C3489;color:#fff;}
.btn-submit{background:#534AB7 !important;color:#fff !important;border:none !important;font-weight:700 !important;}
.btn-submit.p2{background:#0F6E56 !important;color:#fff !important;}

/* message */
#msg{min-height:42px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;border-radius:10px;padding:8px;text-align:center;margin-bottom:.5rem;background:#f5f5f5;color:#666;}
#msg.ok{background:#E1F5EE;color:#0F6E56;}
#msg.er{background:#FCEBEB;color:#A32D2D;}

/* legend */
#leg{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.5rem;font-size:10px;color:#888;}
.lg{display:flex;align-items:center;gap:2px;}
.lb{width:11px;height:11px;border-radius:2px;flex-shrink:0;}

/* words */
#pw{display:flex;gap:4px;flex-wrap:wrap;margin-top:.4rem;}
.wb{border-radius:14px;padding:3px 10px;font-size:12px;font-weight:600;}
.wb.w1{background:#EEEDFE;color:#3C3489;}
.wb.w2{background:#E1F5EE;color:#085041;}

/* selected tile indicator */
#sel-indicator{min-height:32px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#888;margin-bottom:.4rem;}
.sel-show{background:#FAEEDA;color:#633806;border-radius:8px;padding:4px 12px;font-weight:600;}
</style>
</head>
<body>
<div id="app">
  <h1>🔤 שבץ נא בעברית</h1>
  <div id="top">
    <div class="pc" id="c1"><div class="pn">שחקן 1</div><div class="ps" id="s1">0</div><div class="tb" id="b1">התור שלך ✓</div></div>
    <div id="vs"><span style="font-size:14px;font-weight:700;color:#bbb">VS</span><span style="font-size:9px;color:#ccc" id="rl">סיבוב 1</span></div>
    <div class="pc" id="c2"><div class="pn">שחקן 2</div><div class="ps" id="s2">0</div><div class="tb h" id="b2">התור שלך ✓</div></div>
  </div>

  <div id="sel-indicator">בחר אות מהיד ואז לחץ על הלוח</div>

  <div id="dir">
    <button class="a" id="dh" onclick="setDir('h')">← אופקי</button>
    <button id="dv" onclick="setDir('v')">↓ אנכי</button>
  </div>

  <div id="bwrap"><div id="board"></div></div>

  <div id="hwrap">
    <div id="hl">האותיות שלך:</div>
    <div id="hand"></div>
  </div>

  <div id="acts">
    <button id="sb" class="btn-submit" onclick="submit()">✓ הנח</button>
    <button onclick="cancel()">✕ בטל</button>
    <button onclick="skip()">דלג</button>
    <button onclick="init()" style="font-size:11px;color:#aaa">משחק חדש</button>
  </div>

  <div id="msg">שחקן 1 — בחר אות ולחץ על הלוח</div>

  <div id="leg">
    <div class="lg"><div class="lb" style="background:#FAEEDA;border:1px solid #EF9F27"></div>מרכז x2</div>
    <div class="lg"><div class="lb" style="background:#FBEAF0;border:1px solid #ED93B1"></div>מילה x2</div>
    <div class="lg"><div class="lb" style="background:#FCEBEB;border:1px solid #F09595"></div>מילה x3</div>
    <div class="lg"><div class="lb" style="background:#E6F1FB;border:1px solid #85B7EB"></div>אות x2</div>
    <div class="lg"><div class="lb" style="background:#dcf5ec;border:1px solid #5DCAA5"></div>אות x3</div>
  </div>

  <div style="font-size:11px;color:#aaa;margin-top:.3rem">מילים שהונחו:</div>
  <div id="pw"></div>
</div>

  document.getElementById('b1').className='tb'+(cp!==0?' h':'');
  document.getElementById('b2').className='tb'+(cp!==1?' h':'');
  document.getElementById('sb').className=cp===1?'btn-submit p2':'btn-submit';
  document.getElementById('sb').id='sb';
}

function updSel(){
  const el=document.getElementById('sel-indicator');
  if(sel){
    el.innerHTML='<span class="sel-show">נבחרה: '+sel.l+' — לחץ על הלוח להנחה</span>';
  } else if(pv.length>0){
    el.innerHTML='<span class="sel-show">המילה: '+buildWordStr()+'</span>';
  } else {
    el.textContent='בחר אות מהיד ואז לחץ על הלוח';
  }
}

function buildWordStr(){
  const info=buildWord();
  return info?info.word:'';
}

function rb(){
  const el=document.getElementById('board');
  const cs=calcCellSize();
  el.style.gridTemplateColumns='repeat('+SZ+', '+cs+'px)';
  el.innerHTML='';
  for(let r=0;r<SZ;r++){
    for(let c=0;c<SZ;c++){
      const d=document.createElement('div');
      d.className='cl';
      d.style.fontSize=Math.floor(cs*0.42)+'px';
      const k=r+','+c;
      const inPv=pv.find(p=>p.r===r&&p.c===c);
      if(inPv){
        d.textContent=inPv.l;
        d.classList.add('pv');
        d.addEventListener('click',()=>{rmpv(r,c);updSel();});
      } else if(bd[r][c]){
        d.textContent=bd[r][c].l;
        d.classList.add(bd[r][c].p===0?'lp1':'lp2');
      } else {
        const b=BN[k];
        if(b) d.classList.add(b);
        if(b==='st') d.textContent='★';
        else if(b){
          const s=document.createElement('span');s.className='bl';
          s.textContent=b==='dw'?'x2מ':b==='tw'?'x3מ':b==='dl'?'x2א':'x3א';
          d.appendChild(s);
        }
        d.addEventListener('click',()=>{place(r,c);updSel();});
      }
      el.appendChild(d);
    }
  }
}

function rh(){
  const el=document.getElementById('hand');
  const cl=cp===0?'t1':'t2';
  el.innerHTML='';
  hn[cp].forEach(t=>{
    const d=document.createElement('div');d.className='tl2 '+cl;
    const lt=document.createElement('div');lt.className='lt';lt.textContent=t.l;
    const pt=document.createElement('div');pt.className='pt';pt.textContent=LP[t.l]||1;
    d.appendChild(lt);d.appendChild(pt);
    if(sel&&sel.id===t.id) d.classList.add('sel');
    d.addEventListener('click',()=>{sel=(sel&&sel.id===t.id)?null:t;rh();updSel();});
    el.appendChild(d);
  });
  document.getElementById('hl').textContent='האותיות של שחקן '+(cp+1)+' ('+hn[cp].length+'):';
}

function place(r,c){
  if(bd[r][c]||pv.find(p=>p.r===r&&p.c===c)) return;
  if(!sel){msg('קודם בחר אות מהיד!','er');return;}
  if(pv.length>0){
    if(dir==='h'&&r!==pv[0].r){msg('שמור על כיוון אופקי!','er');return;}
    if(dir==='v'&&c!==pv[0].c){msg('שמור על כיוון אנכי!','er');return;}
  }
  pv.push({r,c,l:sel.l,id:sel.id,fromHand:true});
  hn[cp]=hn[cp].filter(t=>t.id!==sel.id);
  sel=null;rb();rh();
  msg('','');
}

function rmpv(r,c){
  const i=pv.findIndex(p=>p.r===r&&p.c===c);if(i<0)return;
  const p=pv.splice(i,1)[0];
  if(p.fromHand) hn[cp].push({id:p.id,l:p.l});
  rb();rh();
}

function cancel(){
  pv.forEach(p=>{if(p.fromHand) hn[cp].push({id:p.id,l:p.l});});
  pv=[];sel=null;rb();rh();updSel();
}

function buildWord(){
  if(pv.length===0) return null;
  const r0=pv[0].r,c0=pv[0].c;
  if(dir==='h'){
    let minC=Math.min(...pv.map(p=>p.c)),maxC=Math.max(...pv.map(p=>p.c));
    while(minC>0&&bd[r0][minC-1]) minC--;
    while(maxC<SZ-1&&bd[r0][maxC+1]) maxC++;
    let letters=[];
    for(let c=minC;c<=maxC;c++){
      const ip=pv.find(p=>p.r===r0&&p.c===c);
      if(ip) letters.push(ip.l);
      else if(bd[r0][c]) letters.push(bd[r0][c].l);
      else return null;
    }
    return {word:letters.join(''),r:r0,c:minC,len:letters.length,dir:'h'};
  } else {
    let minR=Math.min(...pv.map(p=>p.r)),maxR=Math.max(...pv.map(p=>p.r));
    while(minR>0&&bd[minR-1][c0]) minR--;
    while(maxR<SZ-1&&bd[maxR+1][c0]) maxR++;
    let letters=[];
    for(let r=minR;r<=maxR;r++){
      const ip=pv.find(p=>p.r===r&&p.c===c0);
      if(ip) letters.push(ip.l);
      else if(bd[r][c0]) letters.push(bd[r][c0].l);
      else return null;
    }
    return {word:letters.join(''),r:minR,c:c0,len:letters.length,dir:'v'};
  }
}

function usesExistingTile(wi){
  if(fm) return true;
  const {r,c,len,dir:d}=wi;
  for(let i=0;i<len;i++){
    const cr=d==='h'?r:r+i,cc=d==='h'?c+i:c;
    if(bd[cr][cc]) return true;
  }
  return false;
}

function calcScore(wi){
  const {r,c,len,dir:d}=wi;
  let ls=0,wm=1;
  for(let i=0;i<len;i++){
    const cr=d==='h'?r:r+i,cc=d==='h'?c+i:c;
    const letter=bd[cr][cc]?.l||(pv.find(p=>p.r===cr&&p.c===cc)?.l);
    const lp=LP[letter]||1,isN=!!pv.find(p=>p.r===cr&&p.c===cc);
    const b=BN[cr+','+cc];
    if(isN&&b==='dl') ls+=lp*2;
    else if(isN&&b==='tl') ls+=lp*3;
    else ls+=lp;
    if(isN&&(b==='dw'||b==='st')) wm*=2;
    if(isN&&b==='tw') wm*=3;
  }
  return ls*wm;
}

function submit(){
  if(!pv.length){msg('הנח קודם אותיות על הלוח!','er');return;}
  const wi=buildWord();
  if(!wi){msg('יש פערים במילה!','er');return;}
  if(wi.word.length<2){msg('מינימום 2 אותיות!','er');return;}
  if(fm&&!pv.some(p=>p.r===3&&p.c===3)){msg('המילה הראשונה — דרך הכוכב (★)!','er');return;}
  if(!fm&&!usesExistingTile(wi)){msg('המילה חייבת להתחבר לאות קיימת!','er');return;}
  if(!WORD_SET.has(wi.word)){msg('"'+wi.word+'" — לא במילון! נסה שוב','er');return;}
  const pts=calcScore(wi);
  pv.forEach(p=>{bd[p.r][p.c]={l:p.l,p:cp};});
  sc[cp]+=pts;
  document.getElementById('s'+(cp+1)).textContent=sc[cp];
  wl.push({w:wi.word,p:cp,pts});uwl();
  fm=false;pv=[];fillH(cp);
  msg('🎉 "'+wi.word+'" +'+pts+' נקודות!','ok');
  updSel();
  setTimeout(()=>{
    cp=cp===0?1:0;
    if(cp===0) rn++;
    document.getElementById('rl').textContent='סיבוב '+rn;
    utu();rb();rh();
    msg('תור שחקן '+(cp+1),'');
    updSel();
  },1500);
}

function skip(){
  cancel();cp=cp===0?1:0;
  if(cp===0) rn++;
  document.getElementById('rl').textContent='סיבוב '+rn;
  utu();rb();rh();
  msg('תור שחקן '+(cp+1),'');
  updSel();
}

function uwl(){
  const el=document.getElementById('pw');el.innerHTML='';
  wl.forEach(x=>{
    const b=document.createElement('span');
    b.className='wb w'+(x.p+1);
    b.textContent=x.w+' ('+x.pts+')';
    el.appendChild(b);
  });
}

function msg(t,c){
  const e=document.getElementById('msg');
  e.textContent=t||'בחר אות ולחץ על הלוח';
  e.className=c||'';
}

window.addEventListener('resize',()=>rb());
init();
</script>
